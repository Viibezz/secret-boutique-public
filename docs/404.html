<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Secret Boutique</title>
    <script>
      // GitHub Pages SPA redirect: preserves the path and redirects to index.html
      // slice(0,1) always redirects to root — correct for custom domain deployments.
      // slice(0,2) would target a /repo-name/ sub-path and causes redirect loops on custom domains.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        '/?p=' + encodeURIComponent(l.pathname + l.search) + '#' + l.hash.slice(1)
      );
    </script>
  </head>
  <body></body>
</html>
