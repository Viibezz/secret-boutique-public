    <!-- Open Graph -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gallery — Secret Boutique" />

    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        '/?p=' + encodeURIComponent(l.pathname + l.search) + (l.hash ? '#' + l.hash.slice(1) : '')
      );
    </script>
