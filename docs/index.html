    <script>
      // GitHub Pages SPA redirect: restores the path from the 404.html redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            decoded[0] + (decoded[1] ? '&' + decoded[1].slice(1) : '') + (l.hash || '')
          );
        }
      }(window.location));
